name: Check rules

# Manual run: validate every source file, then fully resync. Use this after
# adding a new client (it populates the new client with every existing service)
# or any time you want to force a complete, consistent rebuild.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up RuleConv + cores
        uses: ./.github/actions/ruleconv
        with:
          install-cores: "true"

      - name: Validate and resync
        shell: bash
        run: ruleconv check --repo .

      - name: Commit results
        shell: bash
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m 'chore: full resync [skip ci]'
            git push
          fi
