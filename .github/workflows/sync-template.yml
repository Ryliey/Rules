name: Sync templates

# Manual run: refresh the README templates from the RuleConv build and
# re-render every README. Existing overrides in .ruleconv/templates are kept
# unless "force" is enabled.
on:
  workflow_dispatch:
    inputs:
      force:
        description: overwrite existing template overrides
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  templates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up RuleConv
        uses: ./.github/actions/ruleconv
        with:
          install-cores: "false"

      - name: Sync templates and re-render
        shell: bash
        run: ruleconv template sync --repo . ${{ inputs.force && '--force' || '' }}

      - name: Commit results
        shell: bash
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m 'chore: sync README templates [skip ci]'
            git push
          fi
